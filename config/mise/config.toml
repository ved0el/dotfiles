# mise (https://mise.jdx.dev) — universal version manager
#
# Tools listed here are installed by `mise install` and activated whenever
# you `cd` into a directory under this config's scope. The `pkg_post_install`
# hook in zsh/packages/server/mise.zsh runs `mise install -y` after mise
# itself is installed, so a fresh `dotfiles install` provisions everything.
#
# Pinning to "latest" means each `mise install` re-resolves the newest stable
# release. Pin to a concrete version (e.g. node = "20") if you need stability.

[tools]
node   = "lts"
go     = "latest"
python = "latest"
bun    = "latest"
"npm:pnpm" = "latest"
"npm:yarn" = "latest"

[settings]
experimental = false
