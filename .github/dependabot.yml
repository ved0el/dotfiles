# Keep GitHub Actions pinned-by-SHA references current and patched.
# Dependabot reads the `# vX.Y.Z` comment next to each SHA pin and bumps both
# the SHA and the comment when a new release lands.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns:
          - "*"
