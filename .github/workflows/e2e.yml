name: test

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: this workflow only reads the repo. Override per-job if a step
# ever needs more.
permissions:
  contents: read

jobs:
  # Fast feedback on every push: templates render + dry-run, no package installs.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install chezmoi
        run: |
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Init config from this commit (renders .chezmoi.toml.tmpl with defaults)
        run: chezmoi init --source "$PWD" --promptDefaults --no-tty
      - name: Bootstrap scripts render cleanly (sh + ps1)
        run: |
          chezmoi execute-template --source "$PWD" < run_onchange_after_install-packages.sh.tmpl
          chezmoi execute-template --source "$PWD" < run_onchange_after_install-packages.ps1.tmpl
      - name: Dry-run apply (no changes made)
        run: chezmoi apply --dry-run --source "$PWD"

  # End-to-end: actually runs the bootstrap on clean runners (fresh-machine test).
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install chezmoi
        run: |
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Fresh install (chezmoi init --apply from this commit)
        # --promptDefaults => tools=true, develop=false, tmux=true, wm=false.
        # wm stays off so yabai/skhd (GUI/SIP, impossible in CI) are skipped.
        run: chezmoi init --apply --source "$PWD" --promptDefaults --no-tty
      - name: Verify $HOME matches the repo
        run: chezmoi verify --source "$PWD"

  # End-to-end on Windows: scoop + mise bootstrap on a clean runner (fresh-machine test).
  e2e-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install chezmoi
        shell: pwsh
        run: |
          $bin = Join-Path $HOME '.local\bin'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          iex "&{$(irm 'https://get.chezmoi.io/ps1')} -b '$bin'"
          Add-Content -Path $env:GITHUB_PATH -Value $bin
      - name: Fresh install (chezmoi init --apply from this commit)
        # --promptDefaults => tools=true, develop=false. tmux/wm are Windows-skipped.
        shell: pwsh
        run: chezmoi init --apply --source "$env:GITHUB_WORKSPACE" --promptDefaults --no-tty
      - name: Verify $HOME matches the repo
        shell: pwsh
        run: chezmoi verify --source "$env:GITHUB_WORKSPACE"
